name: Daily STOCK EMA Bot

on:
  schedule:
    - cron: '30 10 * * *'   # 4:00 PM IST (10:30 AM UTC)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ✅ Install all required dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance feedparser requests pandas

      # ✅ Run your bot
      - name: Run script
        run: python stock_ema_bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          PERSONAL_CHAT_ID: ${{ secrets.PERSONAL_CHAT_ID }}
          
          