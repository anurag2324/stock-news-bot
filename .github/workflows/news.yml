name: Daily News Bot

on:
  schedule:
    - cron: '0 3 * * *'   # 8:30 AM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install feedparser requests

    - name: Run script
      run: python news_bot.py
